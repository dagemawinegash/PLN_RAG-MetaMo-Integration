services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  pln-rag:
    build:
      context: ../PLN-RAG
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-openai/gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - PARSER=${PLNRAG_PARSER:-canonical_pln}
      - NL2PLN_MODULE_PATH=/app/data/simba_all.json
      - CANONICAL_PLN_NL2PLN_MODULE_PATH=/app/data/simba_canonical_pln.json
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434/api/embeddings}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-nomic-embed-text}
      - ATOMSPACE_PATH=/app/data/atomspace/kb.metta
      - FAISS_PATH=/app/data/faiss
      - QUERY_FALLBACK_ENABLED=${QUERY_FALLBACK_ENABLED:-true}
    volumes:
      - pln_data:/app/data
      - ../PLN-RAG/data/simba_all.json:/app/data/simba_all.json
      - ../PLN-RAG/data/simba_canonical_pln.json:/app/data/simba_canonical_pln.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  metamo:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      - PLNRAG_BASE_URL=http://pln-rag:8000
    depends_on:
      pln-rag:
        condition: service_healthy
    command: ["sh", "-c", "python scripts/wait_for_pln.py && uvicorn api.main:app --host 0.0.0.0 --port 8000"]
    volumes:
      - ./logs:/app/logs
    restart: "no"

volumes:
  qdrant_data:
  pln_data:
